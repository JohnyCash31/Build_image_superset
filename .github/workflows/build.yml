name: Build Superset Airgap Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t superset-airgap:6.1.0 \
            .

      - name: Verify image
        run: |
          docker images

      - name: Export image
        run: |
          docker save superset-airgap:6.1.0 | gzip > superset-airgap-6.1.0.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: superset-airgap-6.1.0
          path: superset-airgap-6.1.0.tar.gz
          retention-days: 7
