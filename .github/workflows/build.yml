name: Download Superset Airgap Image

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Superset Docker image
        run: |
          docker pull apache/superset:6.1.0

      - name: Verify image
        run: |
          docker images apache/superset:6.1.0

      - name: Export image
        run: |
          docker save apache/superset:6.1.0 | gzip > superset-airgap-6.1.0.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: superset-airgap-6.1.0
          path: superset-airgap-6.1.0.tar.gz
          retention-days: 7
